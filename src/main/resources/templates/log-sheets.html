<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}">
<head><title>لاگ شیت‌ها</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-journal-text text-primary me-2"></i>لاگ شیت‌ها</h4>
        <span class="badge bg-primary fs-6" th:text="${#lists.size(logSheets)} + ' لاگ شیت'"></span>
    </div>

    <!-- Filter -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small mb-1">وضعیت</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="" th:selected="${filterStatus == null}">همه</option>
                        <option value="draft" th:selected="${filterStatus == 'draft'}">پیش‌نویس</option>
                        <option value="submitted" th:selected="${filterStatus == 'submitted'}">ارسال‌شده</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-outline-primary">فیلتر</button>
                    <a href="/log-sheets" class="btn btn-sm btn-outline-secondary me-1">پاک</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>نام قالب</th><th>محدوده</th><th>اپراتور</th><th>وضعیت</th><th>تاریخ ارسال</th><th>تاریخ ایجاد</th><th class="text-center">جزئیات</th></tr>
                </thead>
                <tbody>
                    <tr th:each="ls : ${logSheets}">
                        <td th:text="${ls.templateName}"></td>
                        <td th:text="${ls.scopeSummary}"></td>
                        <td th:text="${ls.operatorName} ?: '—'"></td>
                        <td>
                            <span th:class="'badge ' + (${ls.status == 'submitted'} ? 'bg-primary' : 'bg-warning text-dark')"
                                  th:text="${ls.status == 'submitted' ? 'ارسال‌شده' : 'پیش‌نویس'}"></span>
                        </td>
                        <td th:text="${@dateUtils.format(ls.submittedAt)}"></td>
                        <td th:text="${@dateUtils.format(ls.createdAt)}"></td>
                        <td class="text-center">
                            <a th:href="@{/log-sheets/{id}(id=${ls.id})}" class="btn btn-sm btn-outline-info">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logSheets)}">
                        <td colspan="7" class="text-center text-muted py-5">هیچ لاگ شیتی یافت نشد</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
