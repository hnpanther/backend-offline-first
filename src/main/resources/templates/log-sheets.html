<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>لاگ شیت‌ها</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-journal-text text-primary me-2"></i>لاگ شیت‌ها</h4>
        <div class="d-flex align-items-center gap-2">
            <a sec:authorize="hasAuthority('GET:/log-sheets')" th:href="@{/log-sheets/export(status=${filterStatus})}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-download me-1"></i>خروجی اکسل
            </a>
            <span class="badge bg-primary fs-6" th:if="${listPage != null}" th:text="${listPage.totalElements} + ' لاگ شیت'"></span>
            <span class="badge bg-primary fs-6" th:unless="${listPage != null}" th:text="${#lists.size(logSheets)} + ' لاگ شیت'"></span>
        </div>
    </div>

    <!-- Manual generation from a template (admin/supervisor) -->
    <div sec:authorize="hasAuthority('POST:/log-sheets/generate')" class="card shadow-sm mb-3" th:if="${!#lists.isEmpty(templates)}">
        <div class="card-body py-2">
            <form th:action="@{/log-sheets/generate}" method="post" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small mb-1">تولید دستی لاگ‌شیت از قالب</label>
                    <select name="templateId" class="form-select form-select-sm" required>
                        <option value="" disabled selected>یک قالب را انتخاب کنید…</option>
                        <option th:each="t : ${templates}" th:if="${t.active == null or t.active}" th:value="${t.id}" th:text="${t.name}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-success"><i class="bi bi-plus-lg me-1"></i>تولید</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Filter -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small mb-1">وضعیت</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="" th:selected="${filterStatus == null}">همه</option>
                        <option value="PENDING" th:selected="${filterStatus == 'PENDING'}">در انتظار پیک‌آپ</option>
                        <option value="ASSIGNED" th:selected="${filterStatus == 'ASSIGNED'}">انتساب‌شده</option>
                        <option value="IN_PROGRESS" th:selected="${filterStatus == 'IN_PROGRESS'}">در حال انجام</option>
                        <option value="SUBMITTED" th:selected="${filterStatus == 'SUBMITTED'}">تکمیل‌شده</option>
                        <option value="EXPIRED" th:selected="${filterStatus == 'EXPIRED'}">منقضی</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-1">جستجو</label>
                    <input type="search" name="q" class="form-control form-control-sm" th:value="${q}" placeholder="نام قالب یا مسئول…">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-outline-primary">فیلتر</button>
                    <a href="/log-sheets" class="btn btn-sm btn-outline-secondary me-1">پاک</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>شناسه</th><th>نام قالب</th><th>محدوده</th><th>مسئول</th><th>وضعیت</th><th>مهلت تکمیل</th><th>تاریخ ایجاد</th><th class="text-center">جزئیات</th></tr>
                </thead>
                <tbody>
                    <tr th:each="ls : ${logSheets}">
                        <td><code th:text="${ls.id}"></code></td>
                        <td th:text="${ls.templateName}"></td>
                        <td th:text="${@labels.formatScopeSummary(ls.scopeSummary)}"></td>
                        <td th:text="${ls.operatorName} ?: '—'"></td>
                        <td>
                            <span th:class="'badge ' + ${@logSheetView.statusBadge(ls.status)}"
                                  th:text="${@logSheetView.statusLabel(ls.status)}"></span>
                        </td>
                        <td th:text="${@dateUtils.format(ls.dueAt)}"></td>
                        <td th:text="${@dateUtils.format(ls.createdAt)}"></td>
                        <td class="text-center">
                            <a th:href="@{/log-sheets/{id}(id=${ls.id})}" class="btn btn-sm btn-outline-info">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logSheets)}">
                        <td colspan="8" class="text-center text-muted py-5">هیچ لاگ شیتی یافت نشد</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/list-toolbar :: pagination(basePath='/log-sheets')}"></div>
        </div>
    </div>
</div>
</body>
</html>
