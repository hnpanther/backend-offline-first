<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>کلاس‌های دارایی</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-boxes text-primary me-2"></i>کلاس‌های دارایی</h4>
        <button sec:authorize="hasAuthority('POST:/asset-classes')" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">
            <i class="bi bi-plus-lg me-1"></i>افزودن کلاس
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>نام</th><th>تاریخ ایجاد</th><th>تاریخ بروزرسانی</th><th class="text-center">عملیات</th></tr>
                </thead>
                <tbody>
                    <tr th:each="ac : ${assetClasses}">
                        <td th:text="${ac.name}"></td>
                        <td th:text="${@dateUtils.format(ac.createdAt)}"></td>
                        <td th:text="${@dateUtils.format(ac.updatedAt)}"></td>
                        <td class="text-center">
                            <a sec:authorize="hasAuthority('GET:/asset-classes/{classId}/fields')" th:href="@{/asset-classes/{id}/fields(id=${ac.id})}" class="btn btn-sm btn-outline-info me-1" title="مدیریت فیلدها">
                                <i class="bi bi-list-ul"></i> فیلدها
                            </a>
                            <a sec:authorize="hasAuthority('POST:/asset-classes/{id}')" th:href="@{/asset-classes(editId=${ac.id})}" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
                            <form sec:authorize="hasAuthority('POST:/asset-classes/{id}/delete')" th:action="@{/asset-classes/{id}/delete(id=${ac.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('آیا از حذف اطمینان دارید؟')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(assetClasses)}">
                        <td colspan="4" class="text-center text-muted py-5">هیچ کلاسی ثبت نشده است</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/asset-classes}" method="post">
                    <div class="modal-header"><h5 class="modal-title">افزودن کلاس دارایی</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">نام کلاس *</label>
                            <input type="text" name="name" class="form-control" placeholder="مثال: پمپ سانتریفیوژ" required></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:if="${editEntity != null}" th:action="@{/asset-classes/{id}(id=${editEntity.id})}" method="post">
                    <div class="modal-header"><h5 class="modal-title">ویرایش کلاس دارایی</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">نام کلاس *</label>
                            <input type="text" name="name" class="form-control" th:value="${editEntity.name}" required></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script th:if="${editEntity != null}">
        document.addEventListener('DOMContentLoaded', () => new bootstrap.Modal(document.getElementById('editModal')).show());
    </script>
</div>
</body>
</html>
