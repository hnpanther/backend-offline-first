<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ورود به سامانه</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.rtl.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/vazirmatn.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/enterprise.css}">
</head>
<body class="enterprise-login-page">
<div class="login-card enterprise-login-card card border-0 p-4 p-md-5 mx-3">
    <div class="text-center mb-4">
        <div class="login-brand"><i class="bi bi-shield-lock-fill"></i></div>
        <div class="enterprise-login-eyebrow">پنل سازمانی عملیات</div>
        <h4 class="fw-bold mb-1">ورود به سامانه</h4>
        <p class="text-muted small mb-0">مدیریت یکپارچه لاگ‌شیت</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i> نام کاربری یا رمز عبور نادرست است.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 small">
        <i class="bi bi-check-circle me-1"></i> با موفقیت خارج شدید.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">نام کاربری</label>
            <div class="enterprise-login-field">
                <i class="bi bi-person"></i>
                <input id="username" type="text" name="username" class="form-control" required autofocus autocomplete="username" placeholder="نام کاربری سازمانی">
            </div>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">رمز عبور</label>
            <div class="enterprise-login-field">
                <i class="bi bi-key"></i>
                <input id="password" type="password" name="password" class="form-control" required autocomplete="current-password" placeholder="رمز عبور">
            </div>
        </div>
        <button type="submit" class="btn btn-primary enterprise-login-submit w-100 py-2">
            <span>ورود امن به سامانه</span><i class="bi bi-arrow-left"></i>
        </button>
    </form>
</div>
</body>
</html>
