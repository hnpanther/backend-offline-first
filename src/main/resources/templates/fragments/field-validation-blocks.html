<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Numeric range validation (warning + danger). validation=null for add form. -->
<div th:fragment="numericRanges(validation)" class="col-12 number-validation-block d-none">
    <div class="border rounded p-3 bg-light">
        <div class="mb-3">
            <label class="form-label fw-semibold text-warning-emphasis">
                <i class="bi bi-exclamation-triangle me-1"></i>اعتبارسنجی هشدار
            </label>
            <div class="form-text mb-2">خارج از این بازه → بعداً هشدار زرد نمایش داده می‌شود.</div>
            <div class="row g-2">
                <div class="col-6">
                    <label class="form-label small text-muted">حداقل</label>
                    <input type="number" name="warningMin" class="form-control form-control-sm" step="any"
                           th:value="${validation != null ? @fieldValidation.warningMin(validation) : null}">
                </div>
                <div class="col-6">
                    <label class="form-label small text-muted">حداکثر</label>
                    <input type="number" name="warningMax" class="form-control form-control-sm" step="any"
                           th:value="${validation != null ? @fieldValidation.warningMax(validation) : null}">
                </div>
            </div>
        </div>
        <div>
            <label class="form-label fw-semibold text-danger">
                <i class="bi bi-exclamation-octagon me-1"></i>اعتبارسنجی خطر
            </label>
            <div class="form-text mb-2">خارج از این بازه → شرایط غیرعادی؛ بعداً اقدام انجام می‌شود.</div>
            <div class="row g-2">
                <div class="col-6">
                    <label class="form-label small text-muted">حداقل</label>
                    <input type="number" name="dangerMin" class="form-control form-control-sm" step="any"
                           th:value="${validation != null ? @fieldValidation.dangerMin(validation) : null}">
                </div>
                <div class="col-6">
                    <label class="form-label small text-muted">حداکثر</label>
                    <input type="number" name="dangerMax" class="form-control form-control-sm" step="any"
                           th:value="${validation != null ? @fieldValidation.dangerMax(validation) : null}">
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
