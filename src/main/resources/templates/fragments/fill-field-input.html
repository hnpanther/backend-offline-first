<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Renders a log-sheet fill input for a field definition.
  th:replace="~{fragments/fill-field-input :: field(field=${field}, entry=${entry})}"
-->
<div th:fragment="field(field, entry)" th:with="fname='fd_' + ${entry.id} + '_' + ${field.key},
     current=${entry.formData != null ? entry.formData[field.key] : null},
     options=${field.validation != null ? field.validation['options'] : null},
     wRange=${field.validation != null ? field.validation['warning'] : null},
     dRange=${field.validation != null ? field.validation['danger'] : null},
     warningMin=${wRange != null ? wRange['min'] : (field.validation != null ? field.validation['min'] : null)},
     warningMax=${wRange != null ? wRange['max'] : (field.validation != null ? field.validation['max'] : null)},
     dangerMin=${dRange != null ? dRange['min'] : null},
     dangerMax=${dRange != null ? dRange['max'] : null}">

    <!-- select -->
    <select th:if="${field.dataType == 'select'}" class="form-select form-select-sm fill-field"
            th:name="${fname}" th:attr="data-required=${field.required}">
        <option value="" th:unless="${field.required}">— انتخاب —</option>
        <option th:each="opt : ${options}" th:value="${opt}" th:text="${opt}"
                th:selected="${current != null and current.toString() == opt.toString()}"></option>
    </select>

    <!-- multiselect -->
    <select th:if="${field.dataType == 'multiselect'}" class="form-select form-select-sm fill-field" multiple
            th:name="${fname}" th:attr="data-required=${field.required}, data-multiselect=true">
        <option th:each="opt : ${options}" th:value="${opt}" th:text="${opt}"
                th:selected="${current != null and (#lists.contains(current, opt) or current.toString() == opt.toString())}"></option>
    </select>

    <!-- checkbox -->
    <div th:if="${field.dataType == 'checkbox'}" class="form-check">
        <input type="hidden" th:name="${fname}" value="false">
        <input type="checkbox" class="form-check-input fill-field" th:name="${fname}" value="true"
               th:id="${fname}" th:checked="${current == true or current == 'true'}"
               th:attr="data-required=${field.required}">
        <label class="form-check-label small" th:for="${fname}">بله</label>
    </div>

    <!-- textarea -->
    <textarea th:if="${field.dataType == 'textarea'}" class="form-control form-control-sm fill-field" rows="2"
              th:name="${fname}" th:attr="data-required=${field.required}"
              th:text="${current}"></textarea>

    <!-- number (with range validation feedback) -->
    <div th:if="${field.dataType == 'number'}" class="fill-field-wrap">
        <input class="form-control form-control-sm fill-field fill-field-number"
               th:name="${fname}" type="number" step="any"
               th:attr="data-required=${field.required}"
               th:data-warning-min="${warningMin}"
               th:data-warning-max="${warningMax}"
               th:data-danger-min="${dangerMin}"
               th:data-danger-max="${dangerMax}"
               th:value="${current}">
        <div class="validation-feedback small mt-1 d-none" aria-live="polite"></div>
    </div>

    <!-- default text -->
    <input th:if="${field.dataType != 'select' and field.dataType != 'multiselect'
                    and field.dataType != 'checkbox' and field.dataType != 'textarea'
                    and field.dataType != 'number'}"
           class="form-control form-control-sm fill-field"
           th:name="${fname}" type="text"
           th:attr="data-required=${field.required}"
           th:value="${current}">
</div>

</body>
</html>
