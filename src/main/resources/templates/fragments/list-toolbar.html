<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Search bar: th:replace="~{fragments/list-toolbar :: search(basePath='/asset-entries')}" -->
<form th:fragment="search(basePath)" th:action="${basePath}" method="get" class="row g-2 align-items-end mb-3">
    <div class="col-md-4">
        <label class="form-label small mb-1">جستجو</label>
        <input type="search" name="q" class="form-control form-control-sm" th:value="${q}"
               placeholder="جستجو در فهرست…">
    </div>
    <th:block th:replace="${extraFilters} ?: ~{}"/>
    <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-outline-primary"><i class="bi bi-search me-1"></i>جستجو</button>
        <a th:href="${basePath}" class="btn btn-sm btn-outline-secondary">پاک</a>
    </div>
    <input type="hidden" name="size" th:value="${pageSize}" th:if="${pageSize != null}">
</form>

<!-- Pagination footer: th:replace="~{fragments/list-toolbar :: pagination(basePath='/asset-entries')}" -->
<nav th:fragment="pagination(basePath)" th:if="${listPage != null and listPage.totalPages > 1}"
     aria-label="صفحه‌بندی" class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
    <span class="text-muted small">
        <span th:text="${listPage.totalElements}"></span> مورد —
        صفحه <span th:text="${listPage.number + 1}"></span> از <span th:text="${listPage.totalPages}"></span>
    </span>
    <ul class="pagination pagination-sm mb-0">
        <li th:class="'page-item' + (${listPage.first} ? ' disabled' : '')">
            <a class="page-link"
               th:href="@{${basePath}(page=${listPage.number - 1}, size=${pageSize}, q=${q}, status=${filterStatus}, asset=${filterAsset})}">قبلی</a>
        </li>
        <li th:each="p : ${#numbers.sequence(0, listPage.totalPages - 1)}"
            th:if="${p == 0 or p == listPage.totalPages - 1 or (p >= listPage.number - 2 and p <= listPage.number + 2)}"
            th:class="'page-item' + (${p == listPage.number} ? ' active' : '')">
            <a class="page-link"
               th:href="@{${basePath}(page=${p}, size=${pageSize}, q=${q}, status=${filterStatus}, asset=${filterAsset})}"
               th:text="${p + 1}"></a>
        </li>
        <li th:class="'page-item' + (${listPage.last} ? ' disabled' : '')">
            <a class="page-link"
               th:href="@{${basePath}(page=${listPage.number + 1}, size=${pageSize}, q=${q}, status=${filterStatus}, asset=${filterAsset})}">بعدی</a>
        </li>
    </ul>
</nav>

<!-- Compact count badge when paginated -->
<span th:fragment="count(label)" class="badge bg-secondary fs-6"
      th:text="${listPage != null ? listPage.totalElements : #lists.size(items)} + ' ' + ${label}"></span>

</body>
</html>
