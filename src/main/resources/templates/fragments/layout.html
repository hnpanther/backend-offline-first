<!DOCTYPE html>
<html th:fragment="layout(title, content)" lang="fa" dir="rtl"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">سامانه مدیریت</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.rtl.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/vazirmatn.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/enterprise.css}">
    <link rel="stylesheet" th:href="@{/vendor/mds-bs-datetimepicker/mds.bs.datetimepicker.style.css}">
</head>
<body class="app-body">

<nav class="navbar navbar-dark app-navbar fixed-top">
    <div class="container-fluid px-3 px-lg-4">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-link text-white d-lg-none p-1 me-1" type="button" id="sidebarToggle" aria-label="منو">
                <i class="bi bi-list fs-4"></i>
            </button>
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2 mb-0" href="/">
                <span class="brand-icon"><i class="bi bi-cpu-fill"></i></span>
                <span class="d-none d-sm-inline">سامانه مدیریت دارایی</span>
                <span class="d-inline d-sm-none">مدیریت دارایی</span>
            </a>
            <button class="btn app-sidebar-toggle d-none d-lg-inline-flex" type="button"
                    id="desktopSidebarToggle" aria-controls="desktopSidebar" aria-expanded="true"
                    title="جمع کردن منوی کناری">
                <i class="bi bi-layout-sidebar-inset-reverse" aria-hidden="true"></i>
                <span class="visually-hidden">نمایش یا پنهان کردن منوی کناری</span>
            </button>
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto app-navbar-actions">
        <span class="app-user-summary d-none d-md-inline-flex" sec:authorize="isAuthenticated()">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="principal.user.fullName">کاربر</span>
        </span>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline ms-2">
            <button type="submit" class="btn btn-sm btn-outline-light">
                <i class="bi bi-box-arrow-left"></i> خروج
            </button>
        </form>
        </div>
    </div>
</nav>

<div class="d-flex app-shell">

    <!-- Desktop sidebar -->
    <nav class="app-sidebar d-none d-lg-block shadow-sm" id="desktopSidebar" aria-label="منوی اصلی">
        <div class="app-sidebar-heading">
            <span class="app-sidebar-heading-icon"><i class="bi bi-grid-1x2-fill"></i></span>
            <span><strong>پنل مدیریت</strong><small aria-hidden="true">&nbsp;</small></span>
        </div>
        <ul th:replace="~{fragments/sidebar-nav :: items}"></ul>
    </nav>

    <!-- Mobile offcanvas sidebar -->
    <div class="offcanvas offcanvas-start app-offcanvas d-lg-none" tabindex="-1" id="mobileSidebar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title fw-bold">منوی سامانه</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="بستن منو"></button>
        </div>
        <div class="offcanvas-body p-2">
            <ul th:replace="~{fragments/sidebar-nav :: items}"></ul>
        </div>
    </div>

    <main class="app-main" id="mainContent">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${importErrors != null and !#lists.isEmpty(importErrors)}" class="alert alert-warning alert-dismissible fade show py-2" role="alert">
            <div class="fw-semibold mb-1"><i class="bi bi-exclamation-circle me-1"></i>خطاهای ورود اطلاعات:</div>
            <ul class="mb-0 ps-3">
                <li th:each="err : ${importErrors}" th:text="${err}"></li>
            </ul>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:replace="${content}">محتوا</div>
    </main>
</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/vendor/mds-bs-datetimepicker/mds.bs.datetimepicker.js}"></script>
<script th:src="@{/js/persian-datetime-picker.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/enterprise-ui.js}"></script>
<script th:src="@{/js/remote-select.js}"></script>
</body>
</html>
