<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>تکمیل لاگ شیت</title></head>
<body>
<div id="pageContent">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/log-sheets">لاگ شیت‌ها</a></li>
            <li class="breadcrumb-item"><a th:href="@{/log-sheets/{id}(id=${logSheet.id})}" th:text="${logSheet.templateName}"></a></li>
            <li class="breadcrumb-item active">تکمیل</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>تکمیل لاگ شیت در وب</h4>
        <span class="text-muted small">مهلت تکمیل: <span th:text="${@dateUtils.format(logSheet.dueAt)}">—</span></span>
    </div>

    <div th:if="${logSheet.draftSavedAt != null}" class="alert alert-info py-2">
        <i class="bi bi-save me-1"></i>پیش‌نویس ذخیره شده در <span th:text="${@dateUtils.format(logSheet.draftSavedAt)}"></span>
        — برای ثبت نهایی دکمه «تایید نهایی» را بزنید.
    </div>

    <form id="fillForm" th:action="@{/log-sheets/{id}/complete(id=${logSheet.id})}" method="post">
        <div th:each="entry, st : ${entries}" class="card shadow-sm mb-3">
            <div class="card-header bg-light fw-semibold">
                <span th:text="${entry.assetName}">دارایی</span>
                <code class="ms-2" th:text="${entry.subFunctionTag}"></code>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4" th:each="field : ${fieldsByClass.get(entry.classId)}">
                        <label class="form-label small mb-1">
                            <span th:text="${field.label}">فیلد</span>
                            <span th:if="${field.unit != null and !field.unit.isEmpty()}" class="text-muted" th:text="'(' + ${field.unit} + ')'"></span>
                            <span th:if="${field.required}" class="text-danger">*</span>
                        </label>
                        <input class="form-control form-control-sm fill-field"
                               th:name="'fd_' + ${entry.id} + '_' + ${field.key}"
                               th:type="${field.dataType == 'NUMBER' ? 'number' : (field.dataType == 'DATE' ? 'date' : 'text')}"
                               th:step="${field.dataType == 'NUMBER' ? 'any' : null}"
                               th:attr="data-required=${field.required}"
                               th:value="${entry.formData != null ? entry.formData[field.key] : null}">
                    </div>
                    <div class="col-12" th:if="${fieldsByClass.get(entry.classId) == null or #lists.isEmpty(fieldsByClass.get(entry.classId))}">
                        <span class="text-muted small">برای این کلاس فیلدی تعریف نشده است.</span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(entries)}" class="alert alert-warning">این لاگ‌شیت آیتمی برای تکمیل ندارد.</div>

        <div class="d-flex gap-2 flex-wrap">
            <button type="submit" th:formaction="@{/log-sheets/{id}/draft(id=${logSheet.id})}" formnovalidate
                    class="btn btn-outline-primary"><i class="bi bi-save me-1"></i>ذخیره پیش‌نویس</button>
            <button type="submit" class="btn btn-success" id="finalSubmitBtn"><i class="bi bi-check2-circle me-1"></i>تایید نهایی</button>
            <a th:href="@{/log-sheets/{id}(id=${logSheet.id})}" class="btn btn-outline-secondary">انصراف</a>
        </div>
    </form>
</div>
</body>
</html>
