<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}">
<head><title>مکان‌ها</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-geo-alt text-primary me-2"></i>مکان‌ها</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-success btn-sm" data-bs-toggle="modal" data-bs-target="#importModal">
                <i class="bi bi-file-earmark-excel me-1"></i>ورود از اکسل
            </button>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg me-1"></i>افزودن مکان
            </button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>کد</th><th>نام</th><th>مکان والد</th><th>تاریخ ایجاد</th><th class="text-center">عملیات</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="loc : ${locations}">
                        <td><code th:text="${loc.code}"></code></td>
                        <td th:text="${loc.name}"></td>
                        <td th:text="${loc.parentId} ?: '—'"></td>
                        <td th:text="${@dateUtils.format(loc.createdAt)}"></td>
                        <td class="text-center">
                            <a th:href="@{/locations(editId=${loc.id})}" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/locations/{id}/delete(id=${loc.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('آیا از حذف این مکان اطمینان دارید؟')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(locations)}">
                        <td colspan="5" class="text-center text-muted py-5">هیچ مکانی ثبت نشده است</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/locations}" method="post">
                    <div class="modal-header"><h5 class="modal-title">افزودن مکان جدید</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">کد <span class="text-danger">*</span></label>
                            <input type="text" name="code" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">نام <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">مکان والد</label>
                            <select name="parentId" class="form-select">
                                <option value="">بدون والد</option>
                                <option th:each="l : ${locations}" th:value="${l.id}" th:text="${l.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:if="${editEntity != null}" th:action="@{/locations/{id}(id=${editEntity.id})}" method="post">
                    <div class="modal-header"><h5 class="modal-title">ویرایش مکان</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">کد <span class="text-danger">*</span></label>
                            <input type="text" name="code" class="form-control" th:value="${editEntity.code}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">نام <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" th:value="${editEntity.name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">مکان والد</label>
                            <select name="parentId" class="form-select">
                                <option value="" th:selected="${editEntity.parentId == null}">بدون والد</option>
                                <option th:each="l : ${locations}" th:value="${l.id}" th:text="${l.name}"
                                        th:selected="${l.id == editEntity.parentId}"
                                        th:if="${l.id != editEntity.id}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Import Modal -->
    <div class="modal fade" id="importModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-file-earmark-excel text-success me-2"></i>ورود از اکسل</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">
                        فایل اکسل باید دارای ستون‌های زیر باشد (ردیف اول سرستون):
                        <code>code | name | parentCode | parentName</code>
                    </p>
                    <p class="text-muted small mb-3">
                        برای والد، کافی است یکی از ستون‌های <code>parentCode</code> یا <code>parentName</code> پر باشد.
                    </p>
                    <a href="/locations/import-template" class="btn btn-sm btn-outline-secondary mb-3">
                        <i class="bi bi-download me-1"></i>دانلود فایل نمونه
                    </a>
                    <form th:action="@{/locations/import}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">انتخاب فایل اکسل <span class="text-danger">*</span></label>
                            <input type="file" name="file" class="form-control" accept=".xlsx" required>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                            <button type="submit" class="btn btn-success"><i class="bi bi-upload me-1"></i>ورود اطلاعات</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${editEntity != null}">
        document.addEventListener('DOMContentLoaded', () => new bootstrap.Modal(document.getElementById('editModal')).show());
    </script>
</div>
</body>
</html>
