<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>رکوردها</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-collection text-primary me-2"></i>رکوردهای ثبت‌شده</h4>
        <div class="d-flex align-items-center gap-2">
            <a sec:authorize="hasAuthority('GET:/records')" th:href="@{/records/export}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-download me-1"></i>خروجی اکسل
            </a>
            <span class="badge bg-primary fs-6" th:text="${#lists.size(records)} + ' رکورد'"></span>
        </div>
    </div>

    <!-- Filter -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small mb-1">وضعیت</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="" th:selected="${filterStatus == null}">همه وضعیت‌ها</option>
                        <option value="draft" th:selected="${filterStatus == 'draft'}">پیش‌نویس</option>
                        <option value="approved" th:selected="${filterStatus == 'approved'}">تأیید شده</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small mb-1">نام دارایی</label>
                    <input type="text" name="asset" class="form-control form-control-sm" th:value="${filterAsset}" placeholder="جستجو...">
                </div>
                <div class="col-md-4">
                    <label class="form-label small mb-1">جستجو</label>
                    <input type="search" name="q" class="form-control form-control-sm" th:value="${q}" placeholder="نام دارایی، اپراتور، NFC…">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-outline-primary">اعمال فیلتر</button>
                    <a href="/records" class="btn btn-sm btn-outline-secondary me-1">پاک کردن</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>شناسه</th><th>نام دارایی</th><th>شناسه NFC</th><th>اپراتور</th><th>وضعیت</th><th>تاریخ ثبت</th><th class="text-center">جزئیات</th></tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${records}">
                        <td><code th:text="${r.id}"></code></td>
                        <td th:text="${r.assetName} ?: '—'"></td>
                        <td><code th:text="${r.nfcTagId}"></code></td>
                        <td th:text="${r.operatorName} ?: '—'"></td>
                        <td>
                            <span th:class="'badge ' + (${r.recordStatus == 'approved'} ? 'bg-success' : 'bg-warning text-dark')"
                                  th:text="${r.recordStatus == 'approved' ? 'تأیید شده' : 'پیش‌نویس'}"></span>
                        </td>
                        <td th:text="${@dateUtils.format(r.createdAt)}"></td>
                        <td class="text-center">
                            <a th:href="@{/records/{id}(id=${r.id})}" class="btn btn-sm btn-outline-info">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(records)}">
                        <td colspan="6" class="text-center text-muted py-5">هیچ رکوردی یافت نشد</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/list-toolbar :: pagination(basePath='/records')}"></div>
        </div>
    </div>
</div>
</body>
</html>
