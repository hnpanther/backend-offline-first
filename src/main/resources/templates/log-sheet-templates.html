<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>قالب‌های لاگ شیت</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-file-earmark-text text-primary me-2"></i>قالب‌های لاگ شیت</h4>
        <div class="d-flex gap-2">
            <a sec:authorize="hasAuthority('GET:/log-sheet-templates')" th:href="@{/log-sheet-templates/export}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-download me-1"></i>خروجی اکسل
            </a>
            <button sec:authorize="hasAuthority('POST:/log-sheet-templates')" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg me-1"></i>افزودن قالب
            </button>
        </div>
    </div>

    <div th:replace="~{fragments/list-toolbar :: search(basePath='/log-sheet-templates')}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>شناسه</th><th>نام</th><th>محدوده</th><th>واحد عملیاتی</th>
                        <th>وضعیت قالب</th><th>تولید</th><th>مهلت (دقیقه)</th><th>اجرای بعدی</th><th class="text-center">عملیات</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${templates}">
                        <td><code th:text="${t.id}"></code></td>
                        <td th:text="${t.name}"></td>
                        <td>
                            <span th:switch="${t.scopeType}">
                                <span th:case="'location'" class="badge bg-info">مکان</span>
                                <span th:case="'system'" class="badge bg-success">سیستم</span>
                                <span th:case="'mainFunction'" class="badge bg-warning text-dark">تابع اصلی</span>
                                <span th:case="*" th:text="${t.scopeType}"></span>
                            </span>
                            <div class="small text-muted" th:text="${@labels.templateScopeDisplayLabel(t.scopeType, t.scopeId, t.classId)}"></div>
                        </td>
                        <td th:text="${@labels.operationalUnitLabel(t.operationalUnitId)}"></td>
                        <td>
                            <span th:if="${t.active != null and t.active}" class="badge bg-success">فعال</span>
                            <span th:unless="${t.active != null and t.active}" class="badge bg-secondary">غیرفعال</span>
                        </td>
                        <td>
                            <span th:if="${t.generationMode != null and t.generationMode.name() == 'SCHEDULED'}" class="badge bg-primary"
                                  th:text="'هر ' + ${t.recurrenceEvery} + ' ' + ${t.recurrenceUnit}"></span>
                            <span th:unless="${t.generationMode != null and t.generationMode.name() == 'SCHEDULED'}" class="badge bg-secondary">دستی</span>
                            <div th:if="${t.scheduleActive != null and t.scheduleActive}" class="small text-success">زمان‌بندی فعال</div>
                        </td>
                        <td th:text="${t.completionWindowMinutes} ?: '—'"></td>
                        <td th:text="${@dateUtils.format(t.nextRunAt)}"></td>
                        <td class="text-center">
                            <a sec:authorize="hasAuthority('GET:/log-sheet-templates')"
                               th:href="@{/log-sheet-templates/{id}/preview-assets(id=${t.id})}"
                               class="btn btn-sm btn-outline-info me-1" title="پیش‌نمایش دارایی‌ها">
                                <i class="bi bi-box-seam"></i>
                            </a>
                            <a th:if="${canEditTemplates}" th:href="@{/log-sheet-templates(editId=${t.id}, q=${q}, page=${pageNumber})}" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
                            <form th:if="${canEditTemplates}" th:action="@{/log-sheet-templates/{id}/delete(id=${t.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('آیا از حذف اطمینان دارید؟')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(templates)}">
                        <td colspan="9" class="text-center text-muted py-5">هیچ قالبی ثبت نشده است</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/list-toolbar :: pagination(basePath='/log-sheet-templates')}"></div>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1" data-bs-focus="false">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/log-sheet-templates}" method="post" class="template-form">
                    <div class="modal-header"><h5 class="modal-title">افزودن قالب لاگ شیت</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div th:replace="~{fragments/log-sheet-template-form :: fields(null)}"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" data-bs-focus="false">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:if="${editEntity != null}" th:action="@{/log-sheet-templates/{id}(id=${editEntity.id})}" method="post" class="template-form">
                    <div class="modal-header"><h5 class="modal-title">ویرایش قالب</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div th:replace="~{fragments/log-sheet-template-form :: fields(${editEntity})}"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:if="${editEntity != null}">
        document.addEventListener('DOMContentLoaded', () => new bootstrap.Modal(document.getElementById('editModal')).show());
    </script>
</div>
</body>
</html>
