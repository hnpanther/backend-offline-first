<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}">
<head><title>داشبورد</title></head>
<body>
<div id="pageContent" class="dashboard-page">

    <h4 class="page-title mb-4"><i class="bi bi-speedometer2 me-2"></i>داشبورد</h4>

    <div class="card dashboard-welcome mb-4" sec:authorize="isAuthenticated()">
        <div class="card-body d-flex align-items-center gap-3 py-3">
            <span class="dashboard-welcome-icon"><i class="bi bi-person-check-fill"></i></span>
            <div>
                <div class="dashboard-welcome-label mb-1">مرکز کنترل عملیات</div>
                <div class="fw-semibold fs-5" sec:authentication="principal.user.fullName">کاربر</div>
                <div class="text-muted small mt-1">
                    نام کاربری:
                    <code class="ms-1" sec:authentication="principal.user.username">—</code>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4 dashboard-metrics">
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card dashboard-metric dashboard-metric-blue h-100 text-center">
                <div class="card-body py-3">
                    <i class="bi bi-geo-alt-fill dashboard-metric-icon"></i>
                    <div class="fs-2 fw-bold text-primary" th:text="${locationCount}">0</div>
                    <div class="text-muted small mt-1">مکان‌ها</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card dashboard-metric dashboard-metric-green h-100 text-center">
                <div class="card-body py-3">
                    <i class="bi bi-boxes dashboard-metric-icon"></i>
                    <div class="fs-2 fw-bold text-success" th:text="${assetClassCount}">0</div>
                    <div class="text-muted small mt-1">کلاس دارایی</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card dashboard-metric dashboard-metric-amber h-100 text-center">
                <div class="card-body py-3">
                    <i class="bi bi-upc-scan dashboard-metric-icon"></i>
                    <div class="fs-2 fw-bold text-warning" th:text="${assetEntryCount}">0</div>
                    <div class="text-muted small mt-1">دارایی NFC</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card dashboard-metric dashboard-metric-cyan h-100 text-center">
                <div class="card-body py-3">
                    <i class="bi bi-diagram-2-fill dashboard-metric-icon"></i>
                    <div class="fs-2 fw-bold text-info" th:text="${subFunctionCount}">0</div>
                    <div class="text-muted small mt-1">توابع فرعی</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card stat-card dashboard-metric dashboard-metric-slate h-100 text-center">
                <div class="card-body py-3">
                    <i class="bi bi-journal-check dashboard-metric-icon"></i>
                    <div class="fs-2 fw-bold text-secondary" th:text="${logSheetCount}">0</div>
                    <div class="text-muted small mt-1">لاگ شیت‌ها</div>
                </div>
            </div>
        </div>
    </div>

    <h6 class="dashboard-section-title mb-3"><span>دسترسی سریع</span><small>عملیات پرتکرار سامانه</small></h6>
    <div class="row g-3 dashboard-shortcuts">
        <div class="col-md-6 col-lg-4">
            <a href="/asset-entries" class="card stat-card dashboard-shortcut text-decoration-none h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <span class="dashboard-shortcut-icon"><i class="bi bi-upc-scan"></i></span>
                    <div>
                        <div class="fw-semibold">مدیریت دارایی‌ها</div>
                        <div class="text-muted small">ثبت و ویرایش تگ‌های NFC</div>
                    </div>
                    <i class="bi bi-arrow-left dashboard-shortcut-arrow"></i>
                </div>
            </a>
        </div>
        <div class="col-md-6 col-lg-4">
            <a href="/asset-classes" class="card stat-card dashboard-shortcut text-decoration-none h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <span class="dashboard-shortcut-icon"><i class="bi bi-ui-checks-grid"></i></span>
                    <div>
                        <div class="fw-semibold">کلاس‌های دارایی</div>
                        <div class="text-muted small">تعریف فیلدهای فرم‌ها</div>
                    </div>
                    <i class="bi bi-arrow-left dashboard-shortcut-arrow"></i>
                </div>
            </a>
        </div>
        <div class="col-md-6 col-lg-4">
            <a href="/log-sheets" class="card stat-card dashboard-shortcut text-decoration-none h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <span class="dashboard-shortcut-icon"><i class="bi bi-journal-text"></i></span>
                    <div>
                        <div class="fw-semibold">لاگ شیت‌ها</div>
                        <div class="text-muted small">گزارش‌های دوره‌ای اپراتورها</div>
                    </div>
                    <i class="bi bi-arrow-left dashboard-shortcut-arrow"></i>
                </div>
            </a>
        </div>
        <div class="col-md-6 col-lg-4">
            <a href="/reports" class="card stat-card dashboard-shortcut text-decoration-none h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <span class="dashboard-shortcut-icon"><i class="bi bi-bar-chart-line"></i></span>
                    <div>
                        <div class="fw-semibold">گزارش‌گیری</div>
                        <div class="text-muted small">آمار و تحلیل عملکرد</div>
                    </div>
                    <i class="bi bi-arrow-left dashboard-shortcut-arrow"></i>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
