<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>فیلدهای کلاس دارایی</title></head>
<body>
<div id="pageContent">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/asset-classes">کلاس‌های دارایی</a></li>
            <li class="breadcrumb-item active" th:text="${assetClass?.name}"></li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold">
            <i class="bi bi-list-ul text-primary me-2"></i>
            فیلدهای «<span th:text="${assetClass?.name}"></span>»
        </h4>
        <div class="d-flex gap-2">
            <a sec:authorize="hasAuthority('GET:/asset-classes/{classId}/fields')" th:href="@{/asset-classes/{cid}/fields/export(cid=${assetClass.id})}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-download me-1"></i>خروجی اکسل
            </a>
            <button sec:authorize="hasAuthority('POST:/asset-classes/{classId}/fields')" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg me-1"></i>افزودن فیلد
            </button>
        </div>
    </div>

    <div th:replace="~{fragments/list-toolbar :: search(basePath=@{/asset-classes/{cid}/fields(cid=${assetClass.id})})}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>شناسه</th><th>ترتیب</th><th>کلید</th><th>برچسب</th><th>نوع</th><th>واحد</th><th>اعتبارسنجی</th><th>اجباری</th><th class="text-center">عملیات</th></tr>
                </thead>
                <tbody>
                    <tr th:each="fd : ${fieldDefs}">
                        <td><code th:text="${fd.id}"></code></td>
                        <td th:text="${fd.order}"></td>
                        <td><code th:text="${fd.key}"></code></td>
                        <td th:text="${fd.label}"></td>
                        <td><span class="badge bg-secondary" th:text="${fd.dataType}"></span></td>
                        <td th:text="${fd.unit} ?: '—'"></td>
                        <td class="small" th:text="${@fieldValidation.summary(fd.validation)}"></td>
                        <td>
                            <i class="bi bi-check-circle-fill text-success" th:if="${fd.required}"></i>
                            <i class="bi bi-dash-circle text-muted" th:unless="${fd.required}"></i>
                        </td>
                        <td class="text-center">
                            <a sec:authorize="hasAuthority('POST:/asset-classes/{classId}/fields/{fieldId}')"
                               th:href="@{/asset-classes/{cid}/fields(cid=${assetClass.id}, editId=${fd.id}, q=${q}, page=${pageNumber})}"
                               class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
                            <form sec:authorize="hasAuthority('POST:/asset-classes/{classId}/fields/{fieldId}/delete')" th:action="@{/asset-classes/{cid}/fields/{fid}/delete(cid=${assetClass.id}, fid=${fd.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('آیا از حذف فیلد اطمینان دارید؟')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(fieldDefs)}">
                        <td colspan="9" class="text-center text-muted py-5">هیچ فیلدی تعریف نشده است</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/list-toolbar :: pagination(basePath=@{/asset-classes/{cid}/fields(cid=${assetClass.id})})}"></div>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/asset-classes/{cid}/fields(cid=${assetClass.id})}" method="post">
                    <div class="modal-header"><h5 class="modal-title">افزودن فیلد جدید</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-6"><label class="form-label">کلید (key) *</label>
                                <input type="text" name="key" class="form-control" placeholder="مثال: temperature"
                                       required maxlength="255" pattern=".*\S.*"
                                       title="کلید فیلد الزامی است و نمی‌تواند فقط فاصله باشد."></div>
                            <div class="col-6"><label class="form-label">برچسب نمایشی *</label>
                                <input type="text" name="label" class="form-control" placeholder="مثال: دما" required></div>
                            <div class="col-4"><label class="form-label">نوع داده *</label>
                                <select name="dataType" class="form-select data-type-select" required>
                                    <option value="number">عددی (number)</option>
                                    <option value="text">متنی (text)</option>
                                    <option value="select">انتخابی (select)</option>
                                    <option value="multiselect">چند انتخابی</option>
                                    <option value="checkbox">چک‌باکس</option>
                                    <option value="textarea">متن بلند</option>
                                </select>
                            </div>
                            <div class="col-4"><label class="form-label">واحد</label>
                                <input type="text" name="unit" class="form-control" placeholder="مثال: °C"></div>
                            <div class="col-4"><label class="form-label">ترتیب *</label>
                                <input type="number" name="order" class="form-control" value="1" required></div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input type="checkbox" name="required" value="true" class="form-check-input" id="reqAdd">
                                    <label class="form-check-label" for="reqAdd">فیلد اجباری است</label>
                                </div>
                            </div>
                            <div class="col-12 select-options-block d-none">
                                <label class="form-label">گزینه‌های انتخاب</label>
                                <textarea name="selectOptions" class="form-control" rows="4"
                                          placeholder="هر خط یک گزینه&#10;مثال:&#10;عالی&#10;متوسط&#10;ضعیف"></textarea>
                                <div class="form-text">برای نوع «انتخابی» یا «چند انتخابی» — هر خط یک گزینه.</div>
                            </div>
                            <div th:replace="~{fragments/field-validation-blocks :: numericRanges(null)}"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:if="${editEntity != null}"
                      th:action="@{/asset-classes/{cid}/fields/{fid}(cid=${assetClass.id}, fid=${editEntity.id})}"
                      method="post">
                    <div class="modal-header"><h5 class="modal-title">ویرایش فیلد</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-6"><label class="form-label">کلید *</label>
                                <input type="text" name="key" class="form-control" th:value="${editEntity.key}"
                                       required maxlength="255" pattern=".*\S.*"
                                       title="کلید فیلد الزامی است و نمی‌تواند فقط فاصله باشد."></div>
                            <div class="col-6"><label class="form-label">برچسب *</label>
                                <input type="text" name="label" class="form-control" th:value="${editEntity.label}" required></div>
                            <div class="col-4"><label class="form-label">نوع داده *</label>
                                <select name="dataType" class="form-select data-type-select" required>
                                    <option th:each="t : ${ {'number','text','select','multiselect','checkbox','textarea'} }"
                                            th:value="${t}" th:text="${t}" th:selected="${t == editEntity.dataType}"></option>
                                </select>
                            </div>
                            <div class="col-4"><label class="form-label">واحد</label>
                                <input type="text" name="unit" class="form-control" th:value="${editEntity.unit}"></div>
                            <div class="col-4"><label class="form-label">ترتیب *</label>
                                <input type="number" name="order" class="form-control" th:value="${editEntity.order}" required></div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input type="checkbox" name="required" value="true" class="form-check-input"
                                           id="reqEdit" th:checked="${editEntity.required}">
                                    <label class="form-check-label" for="reqEdit">فیلد اجباری است</label>
                                </div>
                            </div>
                            <div class="col-12 select-options-block"
                                 th:classappend="${editEntity.dataType != 'select' and editEntity.dataType != 'multiselect'} ? ' d-none' : ''">
                                <label class="form-label">گزینه‌های انتخاب</label>
                                <textarea name="selectOptions" class="form-control" rows="4"
                                          th:text="${editSelectOptions}"></textarea>
                            </div>
                            <div th:replace="~{fragments/field-validation-blocks :: numericRanges(${editEntity.validation})}"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script th:if="${editEntity != null}">
        document.addEventListener('DOMContentLoaded', () => new bootstrap.Modal(document.getElementById('editModal')).show());
    </script>
    <script>
        document.querySelectorAll('.data-type-select').forEach(sel => {
            const toggle = () => {
                const form = sel.closest('form');
                const selectBlock = form?.querySelector('.select-options-block');
                const numberBlock = form?.querySelector('.number-validation-block');
                if (selectBlock) {
                    const showSelect = sel.value === 'select' || sel.value === 'multiselect';
                    selectBlock.classList.toggle('d-none', !showSelect);
                }
                if (numberBlock) {
                    numberBlock.classList.toggle('d-none', sel.value !== 'number');
                }
            };
            sel.addEventListener('change', toggle);
            toggle();
        });
    </script>
</div>
</body>
</html>
