spring.application.name=backend-offline-first

spring.datasource.url=jdbc:postgresql://localhost:5432/offline_first_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8081

# Log-sheet scheduler intervals (ms)
app.scheduler.log-sheet-gen-ms=60000
app.scheduler.log-sheet-expiry-ms=60000
# Max missed occurrences to back-fill per template after an outage
app.scheduler.log-sheet-max-backfill=500

# Logging
app.log.path=ProdLog
