spring.application.name=backend-offline-first

spring.datasource.url=jdbc:postgresql://localhost:5432/offline_first_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8081

# JWT signing secret for mobile API (min 32 bytes — override in production via env)
app.auth.jwt.secret=dev-only-change-me-use-long-random-secret-key!!

# Log-sheet scheduler intervals (ms)
app.scheduler.log-sheet-gen-ms=60000
app.scheduler.log-sheet-expiry-ms=60000
# Max missed occurrences to back-fill per template after an outage
app.scheduler.log-sheet-max-backfill=500

# Logging
app.log.path=ProdLog

# Audit trail (async DB writes)
app.audit.enabled=true
app.audit.async.core-pool-size=2
app.audit.async.max-pool-size=4
app.audit.retention.batch-size=5000

# Never expose stack traces or raw exception text in HTML error pages
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
